<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Gamer Setup VR - Pro Version</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
    <a-scene background="color: #000" fog="type: exponential; color: #000; density: 0.012">
        
        <a-assets>
            <a-mixin id="led-neon" material="emissiveIntensity: 5; roughness: 0; metalness: 1"></a-mixin>
        </a-assets>

        <a-entity id="main-block" position="0 0 0">
            
            <a-entity id="room-structure">
                <a-box position="0 -0.1 26" width="20" height="0.1" depth="55" color="#050505"></a-box>
                <a-box id="star-ceiling" position="0 5 26" width="20" height="0.1" depth="55" color="#000"></a-box>
                <a-box position="0 2.5 53.5" width="20" height="5" depth="0.1" color="#080808"></a-box>
                <a-box position="-10 2.5 26" width="0.1" height="5" depth="55" color="#080808"></a-box>
                <a-box position="10 2.5 26" width="0.1" height="5" depth="55" color="#080808"></a-box>
            </a-entity>

            <a-entity id="architectural-lighting">
                <a-box position="-9.9 4.9 26" width="0.05" height="0.05" depth="55" material="color: #0ff; emissive: #0ff" mixin="led-neon"></a-box>
                <a-box position="9.9 4.9 26" width="0.05" height="0.05" depth="55" material="color: #f0f; emissive: #f0f" mixin="led-neon"></a-box>
                <a-box position="0 4.9 53.4" width="20" height="0.05" depth="0.05" material="color: #fff; emissive: #fff" mixin="led-neon"></a-box>
            </a-entity>

            <a-entity id="gamer-station" position="0 0 52.5">
                
                <a-box position="0 0.75 0" width="5" height="0.05" depth="1.5" material="color: #000; roughness: 0.1; metalness: 0.9"></a-box>

                <a-entity id="display-system" position="0 1.5 0.5">
                    <a-plane width="1.6" height="0.9" color="#000">
                        <a-plane position="0 0 0.01" width="1.55" height="0.85" material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 0.3"></a-plane>
                    </a-plane>
                    <a-plane position="-1.55 0 0.35" rotation="0 35 0" width="1.4" height="0.9" color="#000"></a-plane>
                    <a-plane position="1.55 0 0.35" rotation="0 -35 0" width="1.4" height="0.9" color="#000"></a-plane>
                    <a-entity light="type: point; color: #0ff; intensity: 3; distance: 8" position="0 0 -1.2"></a-entity>
                </a-entity>

                <a-box position="0 0.75 0.76" width="5.1" height="0.04" depth="0.04" material="color: #0ff; emissive: #0ff" mixin="led-neon"></a-box>

                <a-entity id="pc-tower" position="2.2 1.3 0">
                    <a-box width="0.5" height="1" depth="0.8" material="color: #111; opacity: 0.4; transparent: true">
                        <a-light type="point" color="#f0f" intensity="2" distance="3"></a-light>
                        <a-torus color="#f0f" radius="0.15" radius-tubular="0.01" position="0 0.3 0.4" rotation="0 0 0" material="emissive: #f0f"></a-torus>
                        <a-torus color="#f0f" radius="0.15" radius-tubular="0.01" position="0 -0.3 0.4" rotation="0 0 0" material="emissive: #f0f"></a-torus>
                    </a-box>
                </a-entity>

                <a-entity id="gamer-chair" position="0 0.6 -1.2" rotation="0 180 0">
                    <a-box width="0.8" height="0.15" depth="0.8" color="#111"></a-box>
                    <a-box position="0 0.7 -0.4" width="0.8" height="1.2" depth="0.15" color="#1a1a1a">
                        <a-box position="0 0.5 0.08" width="0.6" height="0.1" depth="0.02" material="color: #0ff; emissive: #0ff"></a-box>
                    </a-box>
                </a-entity>

            </a-entity>
        </a-entity>

        <a-entity light="type: ambient; color: #111"></a-entity>

        <a-entity position="0 1.6 47">
            <a-camera look-controls wasd-controls>
                <a-cursor color="#00ffff"></a-cursor>
            </a-camera>
        </a-entity>

    </a-scene>

    <script>
        document.querySelector('a-scene').addEventListener('loaded', () => {
            const scene = document.querySelector('a-scene');
            const mainBlock = document.querySelector('#main-block');
            for (let i = 0; i < 400; i++) {
                let star = document.createElement('a-sphere');
                let x = (Math.random() - 0.5) * 20;
                let z = (Math.random() * 55);
                star.setAttribute('position', {x: x, y: 4.9, z: z});
                star.setAttribute('radius', 0.01 + Math.random() * 0.02);
                const colors = ['#fff', '#0ff', '#f0f'];
                const starColor = colors[Math.floor(Math.random() * 3)];
                star.setAttribute('material', {
                    emissive: starColor,
                    emissiveIntensity: 2,
                    color: starColor
                });
                star.setAttribute('animation', {
                    property: 'material.emissiveIntensity',
                    to: 0.2,
                    dur: 1500 + Math.random() * 3000,
                    dir: 'alternate',
                    loop: true
                });
                mainBlock.appendChild(star);
            }
        });
    </script>
</body>
</html>
