    <script>
            AFRAME.registerComponent('simple-collision', {
                init: function () {
                    this.rig = document.querySelector('#camera-rig');
                    const p = this.el.getAttribute('position');
                    this.prevPos = { x: p.x, y: p.y, z: p.z };
                    this.walls = [];
    
    
                    this.el.sceneEl.addEventListener('loaded', () => {
                        this.walls = Array.from(document.querySelectorAll('a-box')).filter(box => {
                            const h = parseFloat(box.getAttribute('height') || 1);
                            const w = parseFloat(box.getAttribute('width') || 1);
                            const d = parseFloat(box.getAttribute('depth') || 1);
                            return h >= 3 && (w <= 0.2 || d <= 0.2);
                        });
                    });
                },
                tick: function () {
                    if (!this.walls.length) return;
    
                    const localPos = this.el.getAttribute('position');
                    const rigPos = this.rig.getAttribute('position');
    
                    // Position monde du joueur (le rig est tourné de 180° sur Y)
                    const px = rigPos.x - localPos.x;
                    const py = localPos.y;
                    const pz = rigPos.z - localPos.z;
    
                    const margin = 0.45;
                    let blocked = false;
    
                    for (const wall of this.walls) {
                        const wp = wall.getAttribute('position');
                        const pp = wall.parentEl.getAttribute('position') || { x: 0, y: 0, z: 0 };
    
                        const wx = pp.x + wp.x;
                        const wy = pp.y + wp.y;
                        const wz = pp.z + wp.z;
    
                        const hw = parseFloat(wall.getAttribute('width')) / 2 + margin;
                        const hh = parseFloat(wall.getAttribute('height')) / 2;
                        const hd = parseFloat(wall.getAttribute('depth')) / 2 + margin;
    
                        if (Math.abs(py - wy) < hh &&
                            Math.abs(px - wx) < hw &&
                            Math.abs(pz - wz) < hd) {
                            blocked = true;
                            break;
                        }
                    }
    
                    if (blocked) {
                        this.el.setAttribute('position', {
                            x: this.prevPos.x,
                            y: localPos.y,
                            z: this.prevPos.z
                        });
                    } else {
                        this.prevPos = { x: localPos.x, y: localPos.y, z: localPos.z };
                    }
                }
            });

            // Composant saut — attaché sur la caméra, utilise tick A-Frame
            AFRAME.registerComponent('jump-control', {
                init: function () {
                    this.enLair = false;
                    this.vitesse = 0;
                    this.GRAVITY = -0.012;
                    this.JUMP_FORCE = 0.22;

                    this._onKeyDown = (e) => {
                        if (e.code === 'Space' && !this.enLair) {
                            e.preventDefault();
                            e.stopPropagation();
                            this.enLair = true;
                            this.vitesse = this.JUMP_FORCE;
                        }
                    };
                    window.addEventListener('keydown', this._onKeyDown, true);
                },
                remove: function () {
                    window.removeEventListener('keydown', this._onKeyDown, true);
                },
                // Retourne le Y de sol pour l'étage courant
                getSolY: function () {
                    const y = this.el.getAttribute('position').y;
                    // Caméra à y=1.5 par étage, étages espacés de 5 unités
                    const etages = [1.5, 6.5, 11.5, 16.5, 21.5];
                    let sol = 1.5;
                    let minDist = Infinity;
                    for (const e of etages) {
                        const d = Math.abs(y - e);
                        if (d < minDist) { minDist = d; sol = e; }
                    }
                    return sol;
                },
                tick: function (time, delta) {
                    if (!this.enLair) return;
                    const dt = Math.min(delta, 50) / 1000; // secondes, max 50ms
                    this.vitesse += this.GRAVITY;
                    const pos = this.el.getAttribute('position');
                    const solY = this.getSolY();
                    const newY = pos.y + this.vitesse;

                    if (newY <= solY) {
                        this.el.setAttribute('position', { x: pos.x, y: solY, z: pos.z });
                        this.vitesse = 0;
                        this.enLair = false;
                    } else {
                        this.el.setAttribute('position', { x: pos.x, y: newY, z: pos.z });
                    }
                }
            });

            const backgroundAudio = document.querySelector('#background-audio');

            const startBackgroundAudio = () => {
                if (!backgroundAudio) return;

                backgroundAudio.volume = 1;
                backgroundAudio.play().catch(() => {});
            };

            ['click', 'keydown', 'touchstart'].forEach((eventName) => {
                window.addEventListener(eventName, startBackgroundAudio, { once: true });
            });
        </script>

                const estVisible = bulleRaton.getAttribute('visible');
                bulleRaton.setAttribute('visible', estVisible === true || estVisible === 'true' ? false : true);
            });


            const demon = document.querySelector('#entite-demon');
            const bulleDemon = document.querySelector('#bulle-demon');

            demon.addEventListener('click', () => {
                const estVisible = bulleDemon.getAttribute('visible');
                bulleDemon.setAttribute('visible', estVisible === true || estVisible === 'true' ? false : true);
            });

            const cpuTrigger = document.querySelector('#quiz-trigger');
            const cpuUI = document.querySelector('#quiz-ui');

            cpuTrigger.addEventListener('click', function () {
                const isVisible = cpuUI.getAttribute('visible');
                cpuUI.setAttribute('visible', isVisible === true || isVisible === 'true' ? false : true);
                console.log("Clic sur CPU reconnu !");
            });

            function repondreCPU(correct) {
                if (correct) {
                    cpuFeedback.setAttribute('value', "CORRECT ! BRAVO");
                    cpuFeedback.setAttribute('color', "#2ecc71");
                } else {
                    cpuFeedback.setAttribute('value', "FAUX ! REESSAIE");
                    cpuFeedback.setAttribute('color', "#e74c3c");
                }
            }

            document.querySelector('#opt-a').addEventListener('click', () => repondreCPU(false));
            document.querySelector('#opt-b').addEventListener('click', () => repondreCPU(true));
            document.querySelector('#opt-c').addEventListener('click', () => repondreCPU(false));

            const ramTrigger = document.querySelector('#ram-quiz-trigger');
            const ramUI = document.querySelector('#ram-quiz-ui');

            ramTrigger.addEventListener('click', function () {

                ramUI.setAttribute('visible', isVisible === true || isVisible === 'true' ? false : true);

            function repondreRAM(correct) {
                if (correct) {
                    ramFeedback.setAttribute('value', "CORRECT ! BRAVO");

        });

        const cam = document.querySelector('#player-camera');
        function tp(y) {
            cam.setAttribute('position', { x: 0, y: y + 1.5, z: -2.5 });
        }
        document.querySelector('#btn-up-e0').addEventListener('click', () => tp(5));
        document.querySelector('#btn-down-e1').addEventListener('click', () => tp(0));
        document.querySelector('#btn-up-e1').addEventListener('click', () => tp(10));
        document.querySelector('#btn-down-e2').addEventListener('click', () => tp(5));
        document.querySelector('#btn-up-e2').addEventListener('click', () => tp(15));
        document.querySelector('#btn-down-e3').addEventListener('click', () => tp(10));
        document.querySelector('#btn-up-e3').addEventListener('click', () => tp(20));

        
        window.addEventListener('keydown', function (event) {
            if (event.code === 'KeyE' || event.key.toLowerCase() === 'e') {
                const rigPos = document.querySelector('#camera-rig').getAttribute('position');
                const playerLocalPos = document.querySelector('#player-camera').getAttribute('position');
                const playerPos = {
                    x: rigPos.x - playerLocalPos.x,
                    y: rigPos.y + playerLocalPos.y,
                    z: rigPos.z - playerLocalPos.z
                };
                const portes = document.querySelectorAll('a-gltf-model[src="#porte-model"]');

                portes.forEach(porte => {
                    const portePos = porte.getAttribute('position');
                    const parentPos = porte.parentEl.getAttribute('position');
                    const doorPos = {
                        x: (parentPos.x || 0) + portePos.x,
                        y: (parentPos.y || 0) + portePos.y,
                        z: (parentPos.z || 0) + portePos.z
                    };
                    const dx = playerPos.x - doorPos.x;
                    const dz = playerPos.z - doorPos.z;
                    const dy = playerPos.y - doorPos.y;
                    const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);

                    if (distance < 3) {
                        const isOpen = porte.getAttribute('data-open') === 'true';
                        if (!isOpen) {
                            porte.setAttribute('animation', "property: rotation; to: 0 90 0; dur: 1000; easing: easeInOutQuad");
                            porte.setAttribute('data-open', 'true');
                        } else {
                            porte.setAttribute('animation', "property: rotation; to: 0 0 0; dur: 1000; easing: easeInOutQuad");
                            porte.setAttribute('data-open', 'false');
                        }
                    }
                });
            }
        });
    </script>
